<!doctype html>
<title>Sports Team Finder</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit&family=Montserrat&family=Open+Sans:wght@500&display=swap" rel="stylesheet">

<body>
    <div class="full-body-container llm-mode">
        <div class="top-text">
            <div class="google-colors">
                <h1 id="google-4">Sports</h1>
                <h1 id="google-3">Team</h1>
                <h1 id="google-0-1">Finder</h1>
            </div>

            <div class="input-box" onclick="document.getElementById('filter-text-val').focus()">
                <img src="{{ url_for('static', filename='images/mag.png') }}" />
                <input
                    placeholder="Search by vibe, style, fanbase, or history"
                    id="filter-text-val"
                    oninput="debouncedFilterText()"
                >
            </div>

            <div class="sport-chips">
                <button class="chip active" data-sport="all" onclick="setFilter('all', this)">All</button>
                <button class="chip" data-sport="soccer" onclick="setFilter('soccer', this)">Soccer</button>
                <button class="chip" data-sport="basketball" onclick="setFilter('basketball', this)">Basketball</button>
                <button class="chip" data-sport="football" onclick="setFilter('football', this)">Football</button>
                <button class="chip" data-sport="baseball" onclick="setFilter('baseball', this)">Baseball</button>
                <button class="chip" data-sport="hockey" onclick="setFilter('hockey', this)">Hockey</button>
            </div>
        </div>

        <div id="answer-box">
            <div class="team-card empty-state">
                <div class="card-header">
                    <h3 class="card-name">RAG retrieval will show here</h3>
                </div>
                <p class="episode-desc">
                    Ask the AI for a team recommendation. The rewritten query and retrieved teams will appear here.
                </p>
            </div>
        </div>

        <div id="messages">
            <div id="loading-indicator" class="loading-indicator" aria-hidden="true">
                <span class="loading-dot"></span>
                <span class="loading-dot"></span>
                <span class="loading-dot"></span>
            </div>
        </div>

        <div class="chat-bar">
            <form id="chat-form" class="input-row">
                <img src="{{ url_for('static', filename='images/mag.png') }}" alt="">
                <input
                    type="text"
                    placeholder="Ask the AI what kind of team fits you best"
                    id="user-input"
                    autocomplete="off"
                >
                <button type="submit" id="send-btn">Send</button>
            </form>
        </div>
    </div>

    <script>
        let activeFilter = "all";
        let lastResults = [];
        let debounceTimer = null;

        function answerBoxTemplate(row) {
            const sport = row.sport || "unknown";
            const league = row.league || "Unknown league";
            const summary = row.summary ? `<p class="card-summary">${row.summary}</p>` : "";
            const score = row.score ?? "N/A";
            const svdScore = row.svd_score ?? "N/A";
            const descr = row.descr || "No description available.";

            return `
                <div class="team-card">
                    <div class="card-header">
                        <h3 class="card-name">${row.title}</h3>
                        <span class="card-sport-badge card-sport-${sport}">${sport}</span>
                    </div>
                    <p class="card-league">${league}</p>
                    ${summary}
                    <p class="card-score">Cosine Sim: ${score} &nbsp;|&nbsp; SVD: ${svdScore}</p>
                    <p class="episode-desc">${descr}</p>
                </div>
            `;
        }

        function setFilter(sport, btn) {
            activeFilter = sport;
            document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
            btn.classList.add("active");
            renderResults(lastResults);
        }

        function renderResults(data) {
            const answerBox = document.getElementById("answer-box");
            answerBox.innerHTML = "";

            const filtered = activeFilter === "all"
                ? data
                : data.filter(row => row.sport === activeFilter);

            if (!filtered.length) {
                answerBox.innerHTML = `
                    <div class="team-card empty-state">
                        <div class="card-header">
                            <h3 class="card-name">No retrieved teams</h3>
                        </div>
                        <p class="episode-desc">
                            Try a broader question or switch the sport filter.
                        </p>
                    </div>
                `;
                return;
            }

            filtered.forEach(row => {
                let tempDiv = document.createElement("div");
                tempDiv.innerHTML = answerBoxTemplate(row);
                answerBox.appendChild(tempDiv.firstElementChild);
            });
        }

        function filterText() {
            const query = document.getElementById("filter-text-val").value.trim();
            const answerBox = document.getElementById("answer-box");

            if (!query) {
                lastResults = [];
                answerBox.innerHTML = `
                    <div class="team-card empty-state">
                        <div class="card-header">
                            <h3 class="card-name">RAG retrieval will show here</h3>
                        </div>
                        <p class="episode-desc">
                            Ask the AI for a team recommendation. The rewritten query and retrieved teams will appear here.
                        </p>
                    </div>
                `;
                return;
            }

            fetch("/search-teams?" + new URLSearchParams({ q: query }).toString())
                .then((response) => response.json())
                .then((data) => {
                    lastResults = data;
                    renderResults(data);
                })
                .catch(() => {
                    answerBox.innerHTML = `
                        <div class="team-card empty-state">
                            <div class="card-header">
                                <h3 class="card-name">Search error</h3>
                            </div>
                            <p class="episode-desc">Could not load retrieval results.</p>
                        </div>
                    `;
                });
        }

        function debouncedFilterText() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(filterText, 180);
        }
    </script>

    <script>
        const messagesEl = document.getElementById("messages");
        const form = document.getElementById("chat-form");
        const chatInput = document.getElementById("user-input");
        const loadingEl = document.getElementById("loading-indicator");
        const sendBtn = document.getElementById("send-btn");

        function addMessage(text, isUser) {
            const div = document.createElement("div");
            div.className = isUser ? "message user" : "message assistant";

            const p = document.createElement("p");
            p.textContent = text;

            div.appendChild(p);
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return div;
        }

        function setLoading(on) {
            chatInput.disabled = on;
            sendBtn.disabled = on;
            loadingEl.setAttribute("aria-hidden", !on);
            loadingEl.classList.toggle("visible", on);

            if (on) {
                messagesEl.appendChild(loadingEl);
                messagesEl.scrollTop = messagesEl.scrollHeight;
            }
        }

        form.addEventListener("submit", function (e) {
            e.preventDefault();
            const text = chatInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            chatInput.value = "";
            setLoading(true);

            fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            })
            .then(function (res) {
                if (!res.ok) {
                    return res.json().then(function (data) {
                        addMessage("Error: " + (data.error || res.status), false);
                        setLoading(false);
                    });
                }

                let assistantDiv = null;
                let p = null;
                let buffer = "";
                const reader = res.body.getReader();
                const decoder = new TextDecoder();

                function processChunk(result) {
                    if (result.done) {
                        setLoading(false);
                        return;
                    }

                    buffer += decoder.decode(result.value, { stream: true });
                    const lines = buffer.split("\n");
                    buffer = lines.pop();

                    for (let i = 0; i < lines.length; i++) {
                        const line = lines[i];
                        if (!line.startsWith("data: ")) continue;

                        try {
                            const data = JSON.parse(line.slice(6));

                            if (data.search_term !== undefined) {
                                document.getElementById("filter-text-val").value = data.search_term;
                                filterText();
                            }

                            if (data.error) {
                                if (!assistantDiv) assistantDiv = addMessage("", false);
                                assistantDiv.querySelector("p").textContent = "Error: " + data.error;
                                setLoading(false);
                                return;
                            }

                            if (data.content !== undefined) {
                                if (!assistantDiv) {
                                    assistantDiv = addMessage("", false);
                                    p = assistantDiv.querySelector("p");
                                    setLoading(false);
                                }
                                p.textContent += data.content;
                                messagesEl.scrollTop = messagesEl.scrollHeight;
                            }
                        } catch (err) {
                        }
                    }

                    return reader.read().then(processChunk);
                }

                return reader.read().then(processChunk);
            })
            .catch(function () {
                addMessage("Something went wrong. Check the console.", false);
                setLoading(false);
            });
        });
    </script>
</body>
